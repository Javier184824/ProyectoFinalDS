<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear tarea</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background-color: #4B3B8C;
            display: flex;
            font-family: sans-serif;
        }

        .sidebar {
            width: 200px;
            min-height: 100vh;
            background-color: #EADDFF;
            display: flex;
            flex-direction: column;
            padding: 20px 14px;
            gap: 10px;
            flex-shrink: 0;
        }

        .sidebar-perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding-bottom: 14px;
            border-bottom: 1px solid #BFB7CC;
            margin-bottom: 4px;
        }

        .icono-usuario {
            width: 48px; height: 48px;
            background-color: #fff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .icono-usuario svg { width: 28px; height: 28px; fill: #6750A4; }
        .sidebar-perfil span { font-size: 0.85rem; color: #1C1B1F; }

        .nav-btn {
            background-color: #6B5B95; color: #fff;
            border: none; border-radius: 8px;
            padding: 10px 12px; font-size: 0.85rem;
            text-align: left; cursor: pointer; width: 100%;
        }

        .nav-btn:hover { background-color: #4F378A; }
        .nav-btn.activo { background-color: #4F378A; }
        .sidebar-espaciador { flex: 1; }

        .btn-cerrar-sesion {
            background-color: #FF383C; color: #fff;
            border: none; border-radius: 8px;
            padding: 10px 12px; font-size: 0.85rem;
            text-align: left; cursor: pointer; width: 100%;
        }

        .btn-cerrar-sesion:hover { background-color: #cc1f22; }

        .contenido {
            flex: 1;
            padding: 28px 24px;
            overflow-y: auto;
        }

        .contenido h2 {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .card-form {
            background-color: #EADDFF;
            border-radius: 14px;
            width: 100%;
            max-width: 640px;
            overflow: hidden;
        }

        .card-header {
            background-color: #6750A4;
            padding: 12px 20px;
        }

        .card-header h3 { color: #fff; font-size: 0.95rem; font-weight: 600; }

        .card-cuerpo {
            padding: 20px 20px 8px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .campo label {
            display: block;
            font-size: 0.85rem;
            color: #1C1B1F;
            margin-bottom: 4px;
        }

        .campo input[type="text"],
        .campo input[type="date"],
        .campo textarea {
            width: 100%;
            padding: 8px 12px;
            border: none; border-radius: 8px;
            background-color: #fff;
            font-size: 0.9rem; color: #1C1B1F;
            outline: none; font-family: inherit;
        }

        .campo input:focus, .campo textarea:focus { box-shadow: 0 0 0 2px #6750A4; }
        .campo textarea { resize: vertical; min-height: 80px; }

        .campo-check {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.88rem; color: #1C1B1F;
        }

        .campo-check input[type="checkbox"] {
            accent-color: #6750A4; width: 16px; height: 16px;
        }

        /* seccion de grupos */
        .seccion-grupos {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .seccion-grupos > label {
            font-size: 0.85rem;
            color: #575757;
            font-weight: 600;
        }

        /* cada bloque de grupo */
        .bloque-grupo {
            background-color: #BFB7CC;
            border-radius: 10px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bloque-grupo-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bloque-grupo-header input[type="text"] {
            flex: 1;
            padding: 6px 10px;
            border: none; border-radius: 6px;
            background-color: #fff;
            font-size: 0.88rem; color: #1C1B1F;
            outline: none;
        }

        .bloque-grupo-header input:focus { box-shadow: 0 0 0 2px #6750A4; }

        .btn-quitar-grupo {
            background-color: #FF383C; color: #fff;
            border: none; border-radius: 6px;
            padding: 5px 10px; font-size: 0.75rem;
            cursor: pointer; flex-shrink: 0;
        }

        /* lista de estudiantes dentro del grupo */
        .lista-miembros {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .fila-miembro {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fila-miembro input[type="text"] {
            flex: 1;
            padding: 5px 8px;
            border: none; border-radius: 6px;
            background-color: #fff;
            font-size: 0.82rem; color: #1C1B1F;
            outline: none;
        }

        .fila-miembro input:focus { box-shadow: 0 0 0 2px #6750A4; }

        .btn-quitar-miembro {
            background-color: #FF383C; color: #fff;
            border: none; border-radius: 4px;
            padding: 3px 8px; font-size: 0.72rem;
            cursor: pointer; flex-shrink: 0;
        }

        .btn-agregar-miembro {
            background-color: #6B5B95; color: #fff;
            border: none; border-radius: 6px;
            padding: 5px 12px; font-size: 0.78rem;
            cursor: pointer; align-self: flex-start;
            margin-top: 2px;
        }

        .btn-agregar-miembro:hover { background-color: #4F378A; }

        .btn-agregar-grupo {
            background-color: #6B5B95; color: #fff;
            border: none; border-radius: 8px;
            padding: 7px 14px; font-size: 0.82rem;
            cursor: pointer; align-self: flex-start;
        }

        .btn-agregar-grupo:hover { background-color: #4F378A; }

        .card-pie {
            padding: 10px 20px 18px;
            display: flex; justify-content: flex-end; gap: 10px;
        }

        .btn-cancelar {
            background-color: #FF383C; color: #fff;
            border: none; border-radius: 20px;
            padding: 9px 24px; font-size: 0.88rem; cursor: pointer;
        }

        .btn-cancelar:hover { background-color: #cc1f22; }

        .btn-crear {
            background-color: #34C759; color: #fff;
            border: none; border-radius: 20px;
            padding: 9px 24px; font-size: 0.88rem; cursor: pointer;
        }

        .btn-crear:hover { background-color: #28a745; }

        .mensaje-error {
            display: none;
            color: #FF383C;
            font-size: 0.78rem;
            padding: 0 20px 8px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-perfil">
            <div class="icono-usuario">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
            </div>
            <span id="nombreUsuario">Usuario</span>
        </div>

        <button class="nav-btn" id="btnCursos">Cursos</button>
        <button class="nav-btn activo">Crear tarea</button>

        <div class="sidebar-espaciador"></div>
        <button class="btn-cerrar-sesion" id="btnCerrarSesion">Cerrar sesion</button>
    </aside>

    <main class="contenido">
        <h2 id="tituloPantalla">Crear tarea</h2>

        <div class="card-form">
            <div class="card-header"><h3 id="tituloCard">Nueva tarea</h3></div>

            <div class="card-cuerpo">
                <div class="campo">
                    <label for="selectCurso">Curso</label>
                    <select id="selectCurso" style="width:100%;padding:8px 12px;border:none;border-radius:8px;background-color:#fff;font-size:0.9rem;color:#1C1B1F;outline:none;">
                        <option value="">Cargando cursos...</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="inputNombre">Nombre de la tarea</label>
                    <input type="text" id="inputNombre" placeholder="Ej: Numero par o impar">
                </div>

                <div class="campo">
                    <label for="inputDescripcion">Instrucciones</label>
                    <textarea id="inputDescripcion" placeholder="Describa lo que debe hacer el estudiante..."></textarea>
                </div>

                <div class="campo">
                    <label for="inputFechaEntrega">Fecha de entrega</label>
                    <input type="date" id="inputFechaEntrega">
                </div>

                <div class="campo-check">
                    <input type="checkbox" id="checkGrupal">
                    <label for="checkGrupal">Tarea grupal</label>
                </div>
                <p id="avisoGrupal" style="display:none; font-size:0.78rem; color:#575757; padding: 0 0 4px 0;">
                    Los grupos se configuran desde "Gestionar grupos" después de crear la tarea.
                </p>
            </div>

            <p class="mensaje-error" id="mensajeError"></p>

            <div class="card-pie">
                <button class="btn-cancelar" id="btnCancelar">Cancelar</button>
                <button class="btn-crear" id="btnCrear">Crear</button>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        const BASE = window.API_BASE;

        const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
        if (!usuario.idUsuario) window.location.href = BASE + '/login';
        if (usuario.nombre) document.getElementById('nombreUsuario').textContent = usuario.nombre;

        // si viene idTarea en la url estamos editando, si no es creacion nueva
        const params       = new URLSearchParams(window.location.search);
        const idTarea      = params.get('idTarea');
        const idCursoParam  = params.get('idCurso');
        const esEdicion    = !!idTarea;

        const selectCurso  = document.getElementById('selectCurso');
        const checkGrupal  = document.getElementById('checkGrupal');
        // Muestra un aviso informativo cuando la tarea es grupal
        checkGrupal.addEventListener('change', () => {
            const aviso = document.getElementById('avisoGrupal');
            aviso.style.display = checkGrupal.checked ? 'block' : 'none';
        });

        // navegacion
        document.getElementById('btnCursos').addEventListener('click', () => {
            window.location.href = BASE + '/menuProfesor';
        });
        document.getElementById('btnCancelar').addEventListener('click', () => {
            window.location.href = BASE + '/menuProfesor';
        });

        // en modo edicion ajustamos titulos y precargamos los campos desde la url
        if (esEdicion) {
            document.getElementById('tituloPantalla').textContent = 'Editar tarea';
            document.getElementById('tituloCard').textContent     = 'Editar tarea';
            document.getElementById('btnCrear').textContent        = 'Guardar';
            document.getElementById('inputNombre').value      = params.get('nombre') || '';
            document.getElementById('inputDescripcion').value = params.get('descripcion') || '';
            document.getElementById('inputFechaEntrega').value = params.get('fechaEntrega') || '';
        }

        // carga los cursos del profesor en el selector
        async function cargarCursos() {
            try {
                const response = await fetch(BASE + '/api/cursos', {
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json().catch(() => null);

                if (!response.ok || !data || !data.cursos) {
                    selectCurso.innerHTML = '<option value="">No se pudieron cargar los cursos</option>';
                    return;
                }

                if (data.cursos.length === 0) {
                    selectCurso.innerHTML = '<option value="">No hay cursos, cree uno primero</option>';
                    return;
                }

                selectCurso.innerHTML = '';
                data.cursos.forEach(curso => {
                    const opt = document.createElement('option');
                    opt.value       = curso.idCurso;
                    opt.textContent = curso.nombreCurso;
                    if (idCursoParam && String(curso.idCurso) === String(idCursoParam)) {
                        opt.selected = true;
                    }
                    selectCurso.appendChild(opt);
                });
            } catch (error) {
                selectCurso.innerHTML = '<option value="">Error de conexion</option>';
            }
        }

        document.getElementById('btnCrear').addEventListener('click', async () => {
            const idCurso      = selectCurso.value;
            const nombre       = document.getElementById('inputNombre').value.trim();
            const descripcion  = document.getElementById('inputDescripcion').value.trim();
            const fechaEntrega = document.getElementById('inputFechaEntrega').value;
            const esGrupal     = checkGrupal.checked ? 1 : 0;
            const mensajeError = document.getElementById('mensajeError');

            mensajeError.style.display = 'none';

            if (!idCurso) {
                mensajeError.textContent   = 'Seleccione un curso.';
                mensajeError.style.display = 'block';
                return;
            }

            if (!nombre || !fechaEntrega) {
                mensajeError.textContent   = 'El nombre y la fecha de entrega son obligatorios.';
                mensajeError.style.display = 'block';
                return;
            }

            // el backend exige fechaEntrega posterior a la creacion, enviamos fecha y hora
            const cuerpo = {
                idCurso: parseInt(idCurso, 10),
                nombre,
                descripcion,
                fechaEntrega: fechaEntrega + ' 23:59:00',
                esGrupal
            };

            const url    = esEdicion ? (BASE + '/api/tareas/' + idTarea) : (BASE + '/api/tareas');
            const metodo = esEdicion ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cuerpo)
                });

                const data = await response.json().catch(() => null);

                if (!response.ok) {
                    mensajeError.textContent   = (data && data.error) ? data.error : 'Error al guardar la tarea.';
                    mensajeError.style.display = 'block';
                    return;
                }

                window.location.href = BASE + '/menuProfesor';

            } catch (error) {
                mensajeError.textContent   = 'Error de conexion. Intente de nuevo.';
                mensajeError.style.display = 'block';
            }
        });

        document.getElementById('btnCerrarSesion').addEventListener('click', () => {
            sessionStorage.removeItem('usuario');
            window.location.href = BASE + '/login';
        });

        cargarCursos();
    </script>
</body>
</html>
