<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear tarea</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background-color: #4B3B8C;
            display: flex;
            font-family: sans-serif;
        }

        .sidebar {
            width: 200px;
            min-height: 100vh;
            background-color: #EADDFF;
            display: flex;
            flex-direction: column;
            padding: 20px 14px;
            gap: 10px;
            flex-shrink: 0;
        }

        .sidebar-perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding-bottom: 14px;
            border-bottom: 1px solid #BFB7CC;
            margin-bottom: 4px;
        }

        .icono-usuario {
            width: 48px; height: 48px;
            background-color: #fff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .icono-usuario svg { width: 28px; height: 28px; fill: #6750A4; }
        .sidebar-perfil span { font-size: 0.85rem; color: #1C1B1F; }

        .nav-btn {
            background-color: #6B5B95; color: #fff;
            border: none; border-radius: 8px;
            padding: 10px 12px; font-size: 0.85rem;
            text-align: left; cursor: pointer; width: 100%;
        }

        .nav-btn:hover { background-color: #4F378A; }
        .nav-btn.activo { background-color: #4F378A; }
        .sidebar-espaciador { flex: 1; }

        .btn-cerrar-sesion {
            background-color: #FF383C; color: #fff;
            border: none; border-radius: 8px;
            padding: 10px 12px; font-size: 0.85rem;
            text-align: left; cursor: pointer; width: 100%;
        }

        .btn-cerrar-sesion:hover { background-color: #cc1f22; }

        .contenido {
            flex: 1;
            padding: 28px 24px;
            overflow-y: auto;
        }

        .contenido h2 {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .card-form {
            background-color: #EADDFF;
            border-radius: 14px;
            width: 100%;
            max-width: 640px;
            overflow: hidden;
        }

        .card-header {
            background-color: #6750A4;
            padding: 12px 20px;
        }

        .card-header h3 { color: #fff; font-size: 0.95rem; font-weight: 600; }

        .card-cuerpo {
            padding: 20px 20px 8px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .campo label {
            display: block;
            font-size: 0.85rem;
            color: #1C1B1F;
            margin-bottom: 4px;
        }

        .campo input[type="text"],
        .campo input[type="date"],
        .campo textarea {
            width: 100%;
            padding: 8px 12px;
            border: none; border-radius: 8px;
            background-color: #fff;
            font-size: 0.9rem; color: #1C1B1F;
            outline: none; font-family: inherit;
        }

        .campo input:focus, .campo textarea:focus { box-shadow: 0 0 0 2px #6750A4; }
        .campo textarea { resize: vertical; min-height: 80px; }

        .campo-check {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.88rem; color: #1C1B1F;
        }

        .campo-check input[type="checkbox"] {
            accent-color: #6750A4; width: 16px; height: 16px;
        }

        /* seccion de grupos inline en crear tarea */
        .seccion-grupos-inline {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .seccion-grupos-inline > .grupos-titulo {
            font-size: 0.85rem;
            color: #575757;
            font-weight: 600;
        }

        .bloque-grupo-inline {
            background-color: #BFB7CC;
            border-radius: 10px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bloque-grupo-inline-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bloque-grupo-inline-header input[type="text"] {
            flex: 1;
            padding: 6px 10px;
            border: none; border-radius: 6px;
            background-color: #fff;
            font-size: 0.88rem; color: #1C1B1F;
            outline: none;
        }

        .bloque-grupo-inline-header input:focus { box-shadow: 0 0 0 2px #6750A4; }

        .btn-quitar-grupo-inline {
            background-color: #FF383C; color: #fff;
            border: none; border-radius: 6px;
            padding: 5px 10px; font-size: 0.75rem;
            cursor: pointer; flex-shrink: 0;
        }

        /* miembros dentro del bloque */
        .lista-miembros-inline {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .fila-miembro-inline {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #D9D9D9;
            border-radius: 8px;
            padding: 7px 10px;
        }

        .fila-miembro-inline .datos-est { flex: 1; }
        .fila-miembro-inline .datos-est .carnet-est { font-size: 0.82rem; color: #1C1B1F; font-weight: 500; }
        .fila-miembro-inline .datos-est .nombre-est  { font-size: 0.72rem; color: #575757; }

        .btn-quitar-miembro-inline {
            background-color: #FF383C; color: #fff;
            border: none; border-radius: 6px;
            padding: 4px 9px; font-size: 0.72rem;
            cursor: pointer; flex-shrink: 0;
        }

        /* buscador dropdown inline */
        .buscador-inline-wrap { position: relative; }

        .buscador-inline-wrap input {
            width: 100%;
            padding: 7px 10px;
            border: none; border-radius: 8px;
            background-color: #fff;
            font-size: 0.84rem; color: #1C1B1F;
            outline: none;
        }

        .buscador-inline-wrap input:focus { box-shadow: 0 0 0 2px #6750A4; }

        .dropdown-inline {
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
            max-height: 200px;
            overflow-y: auto;
            z-index: 50;
            display: none;
        }

        .dropdown-inline.abierto { display: block; }

        .item-drop {
            padding: 9px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .item-drop:last-child { border-bottom: none; }
        .item-drop:hover:not(.ocupado) { background-color: #EADDFF; }
        .item-drop.ocupado { opacity: 0.5; cursor: not-allowed; }

        .item-drop .item-nombre { font-size: 0.84rem; color: #1C1B1F; font-weight: 500; }
        .item-drop .item-sub    { font-size: 0.71rem; color: #575757; }

        .badge-libre-inline {
            font-size: 0.67rem; background-color: #34C759;
            color: #fff; border-radius: 10px;
            padding: 2px 7px; flex-shrink: 0;
        }

        .badge-ocupado-inline {
            font-size: 0.67rem; background-color: #FF383C;
            color: #fff; border-radius: 10px;
            padding: 2px 7px; flex-shrink: 0; white-space: nowrap;
        }

        .drop-vacio {
            padding: 10px 12px;
            font-size: 0.82rem; color: #888;
            text-align: center;
        }

        .btn-agregar-grupo-inline {
            background-color: #6B5B95; color: #fff;
            border: none; border-radius: 8px;
            padding: 7px 14px; font-size: 0.82rem;
            cursor: pointer; align-self: flex-start;
        }

        .btn-agregar-grupo-inline:hover { background-color: #4F378A; }

        /* seccion de grupos */
        .seccion-grupos {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .seccion-grupos > label {
            font-size: 0.85rem;
            color: #575757;
            font-weight: 600;
        }

        /* cada bloque de grupo */
        .bloque-grupo {
            background-color: #BFB7CC;
            border-radius: 10px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bloque-grupo-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bloque-grupo-header input[type="text"] {
            flex: 1;
            padding: 6px 10px;
            border: none; border-radius: 6px;
            background-color: #fff;
            font-size: 0.88rem; color: #1C1B1F;
            outline: none;
        }

        .bloque-grupo-header input:focus { box-shadow: 0 0 0 2px #6750A4; }

        .btn-quitar-grupo {
            background-color: #FF383C; color: #fff;
            border: none; border-radius: 6px;
            padding: 5px 10px; font-size: 0.75rem;
            cursor: pointer; flex-shrink: 0;
        }

        /* lista de estudiantes dentro del grupo */
        .lista-miembros {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .fila-miembro {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fila-miembro input[type="text"] {
            flex: 1;
            padding: 5px 8px;
            border: none; border-radius: 6px;
            background-color: #fff;
            font-size: 0.82rem; color: #1C1B1F;
            outline: none;
        }

        .fila-miembro input:focus { box-shadow: 0 0 0 2px #6750A4; }

        .btn-quitar-miembro {
            background-color: #FF383C; color: #fff;
            border: none; border-radius: 4px;
            padding: 3px 8px; font-size: 0.72rem;
            cursor: pointer; flex-shrink: 0;
        }

        .btn-agregar-miembro {
            background-color: #6B5B95; color: #fff;
            border: none; border-radius: 6px;
            padding: 5px 12px; font-size: 0.78rem;
            cursor: pointer; align-self: flex-start;
            margin-top: 2px;
        }

        .btn-agregar-miembro:hover { background-color: #4F378A; }

        .btn-agregar-grupo {
            background-color: #6B5B95; color: #fff;
            border: none; border-radius: 8px;
            padding: 7px 14px; font-size: 0.82rem;
            cursor: pointer; align-self: flex-start;
        }

        .btn-agregar-grupo:hover { background-color: #4F378A; }

        .card-pie {
            padding: 10px 20px 18px;
            display: flex; justify-content: flex-end; gap: 10px;
        }

        .btn-cancelar {
            background-color: #FF383C; color: #fff;
            border: none; border-radius: 20px;
            padding: 9px 24px; font-size: 0.88rem; cursor: pointer;
        }

        .btn-cancelar:hover { background-color: #cc1f22; }

        .btn-crear {
            background-color: #34C759; color: #fff;
            border: none; border-radius: 20px;
            padding: 9px 24px; font-size: 0.88rem; cursor: pointer;
        }

        .btn-crear:hover { background-color: #28a745; }

        .mensaje-error {
            display: none;
            color: #FF383C;
            font-size: 0.78rem;
            padding: 0 20px 8px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-perfil">
            <div class="icono-usuario">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
            </div>
            <span id="nombreUsuario">Usuario</span>
        </div>

        <button class="nav-btn" id="btnCursos">Cursos</button>
        <button class="nav-btn activo">Crear tarea</button>

        <div class="sidebar-espaciador"></div>
        <button class="btn-cerrar-sesion" id="btnCerrarSesion">Cerrar sesion</button>
    </aside>

    <main class="contenido">
        <h2 id="tituloPantalla">Crear tarea</h2>

        <div class="card-form">
            <div class="card-header"><h3 id="tituloCard">Nueva tarea</h3></div>

            <div class="card-cuerpo">
                <div class="campo">
                    <label for="selectCurso">Curso</label>
                    <select id="selectCurso" style="width:100%;padding:8px 12px;border:none;border-radius:8px;background-color:#fff;font-size:0.9rem;color:#1C1B1F;outline:none;">
                        <option value="">Cargando cursos...</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="inputNombre">Nombre de la tarea</label>
                    <input type="text" id="inputNombre" placeholder="Ej: Numero par o impar">
                </div>

                <div class="campo">
                    <label for="inputDescripcion">Instrucciones</label>
                    <textarea id="inputDescripcion" placeholder="Describa lo que debe hacer el estudiante..."></textarea>
                </div>

                <div class="campo">
                    <label for="inputFechaEntrega">Fecha de entrega</label>
                    <input type="date" id="inputFechaEntrega">
                </div>

                <div class="campo-check">
                    <input type="checkbox" id="checkGrupal">
                    <label for="checkGrupal">Tarea grupal</label>
                </div>

                <!-- seccion grupos inline: aparece al marcar el checkbox -->
                <div class="seccion-grupos-inline" id="seccionGruposInline">
                    <span class="grupos-titulo">Grupos de trabajo</span>
                    <div id="contenedorGruposInline"></div>
                    <button type="button" class="btn-agregar-grupo-inline" id="btnAgregarGrupoInline">+ Agregar grupo</button>
                    <p style="font-size:0.75rem; color:#575757; margin-top:-4px;">
                        También puedes gestionar grupos después desde la pantalla de entregas.
                    </p>
                </div>
            </div>

            <p class="mensaje-error" id="mensajeError"></p>

            <div class="card-pie">
                <button class="btn-cancelar" id="btnCancelar">Cancelar</button>
                <button class="btn-crear" id="btnCrear">Crear</button>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        const BASE = window.API_BASE;

        const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
        if (!usuario.idUsuario) window.location.href = BASE + '/login';
        if (usuario.nombre) document.getElementById('nombreUsuario').textContent = usuario.nombre;

        // si viene idTarea en la url estamos editando, si no es creacion nueva
        const params       = new URLSearchParams(window.location.search);
        const idTarea      = params.get('idTarea');
        const idCursoParam  = params.get('idCurso');
        const esEdicion    = !!idTarea;

        const selectCurso  = document.getElementById('selectCurso');
        const checkGrupal  = document.getElementById('checkGrupal');
        // Muestra un aviso informativo cuando la tarea es grupal
        checkGrupal.addEventListener('change', () => {
            const sec = document.getElementById('seccionGruposInline');
            sec.style.display = checkGrupal.checked ? 'flex' : 'none';
            if (!checkGrupal.checked) {
                // limpiar grupos si desmarca
                document.getElementById('contenedorGruposInline').innerHTML = '';
                gruposInline = [];
                estudiantesDisponibles = [];
            } else if (estudiantesDisponibles.length === 0) {
                cargarEstudiantesParaGrupos();
            }
        });

        // navegacion
        document.getElementById('btnCursos').addEventListener('click', () => {
            window.location.href = BASE + '/menuProfesor';
        });
        document.getElementById('btnCancelar').addEventListener('click', () => {
            window.location.href = BASE + '/menuProfesor';
        });

        // en modo edicion ajustamos titulos y precargamos los campos desde la url
        if (esEdicion) {
            document.getElementById('tituloPantalla').textContent = 'Editar tarea';
            document.getElementById('tituloCard').textContent     = 'Editar tarea';
            document.getElementById('btnCrear').textContent        = 'Guardar';
            document.getElementById('inputNombre').value      = params.get('nombre') || '';
            document.getElementById('inputDescripcion').value = params.get('descripcion') || '';
            document.getElementById('inputFechaEntrega').value = params.get('fechaEntrega') || '';
        }

        // carga los cursos del profesor en el selector
        async function cargarCursos() {
            try {
                const response = await fetch(BASE + '/api/cursos', {
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json().catch(() => null);

                if (!response.ok || !data || !data.cursos) {
                    selectCurso.innerHTML = '<option value="">No se pudieron cargar los cursos</option>';
                    return;
                }

                if (data.cursos.length === 0) {
                    selectCurso.innerHTML = '<option value="">No hay cursos, cree uno primero</option>';
                    return;
                }

                selectCurso.innerHTML = '';
                data.cursos.forEach(curso => {
                    const opt = document.createElement('option');
                    opt.value       = curso.idCurso;
                    opt.textContent = curso.nombreCurso;
                    if (idCursoParam && String(curso.idCurso) === String(idCursoParam)) {
                        opt.selected = true;
                    }
                    selectCurso.appendChild(opt);
                });
            } catch (error) {
                selectCurso.innerHTML = '<option value="">Error de conexion</option>';
            }
        }

        // ── estado de grupos inline ───────────────────────────
        let gruposInline = [];          // [{nombre, miembros:[{idUsuario,carnet,nombre}]}]
        let estudiantesDisponibles = []; // lista que llega del backend

        // carga los estudiantes del curso seleccionado para el dropdown
        async function cargarEstudiantesParaGrupos() {
            const idCurso = selectCurso.value;
            if (!idCurso) return;
            try {
                const res = await fetch(BASE + '/api/cursos/' + idCurso + '/estudiantes');
                const data = await res.json().catch(() => null);
                if (data && data.estudiantes) {
                    estudiantesDisponibles = data.estudiantes;
                }
            } catch (_) {}
        }

        
        // cuando cambia el curso, recargar estudiantes si la seccion de grupos esta abierta
        selectCurso.addEventListener('change', () => {
            if (checkGrupal.checked) {
                estudiantesDisponibles = [];
                cargarEstudiantesParaGrupos();
            }
        });

        // obtener IDs de estudiantes ya asignados en otros grupos (excluye el grupo actual)
        function obtenerAsignadosInline(excluirIdx) {
            const set = new Set();
            gruposInline.forEach((g, i) => {
                if (i === excluirIdx) return;
                g.miembros.forEach(m => set.add(Number(m.idUsuario)));
            });
            return set;
        }

        // renderiza el dropdown de estudiantes para un bloque de grupo
        function renderDropdownInline(dropdown, q, grupoIdx, listaMiembrosEl, inputBuscar) {
            dropdown.innerHTML = '';

            const enEsteGrupo = new Set(gruposInline[grupoIdx].miembros.map(m => Number(m.idUsuario)));
            const enOtroGrupo = obtenerAsignadosInline(grupoIdx);

            const candidatos = estudiantesDisponibles.filter(e => {
                if (enEsteGrupo.has(Number(e.idUsuario))) return false;
                if (!q) return true;
                return (
                    (e.nombre  || '').toLowerCase().includes(q) ||
                    (e.carnet  || '').toLowerCase().includes(q) ||
                    (e.correo  || '').toLowerCase().includes(q)
                );
            });

            if (candidatos.length === 0) {
                dropdown.innerHTML = '<p class="drop-vacio">' +
                    (estudiantesDisponibles.length === 0
                        ? 'Seleccione un curso con estudiantes matriculados'
                        : 'Sin resultados') +
                    '</p>';
                dropdown.classList.add('abierto');
                return;
            }

            candidatos.forEach(e => {
                const ocupado = enOtroGrupo.has(Number(e.idUsuario));
                const item = document.createElement('div');
                item.className = 'item-drop' + (ocupado ? ' ocupado' : '');

                const info = document.createElement('div');
                info.innerHTML = '<div class="item-nombre">' + e.nombre + '</div>' +
                                 '<div class="item-sub">' + (e.carnet || '') + ' · ' + (e.correo || '') + '</div>';

                const badge = document.createElement('span');
                badge.className   = ocupado ? 'badge-ocupado-inline' : 'badge-libre-inline';
                badge.textContent = ocupado ? 'Ya en grupo' : 'Disponible';

                item.appendChild(info);
                item.appendChild(badge);

                if (!ocupado) {
                    item.onclick = () => {
                        gruposInline[grupoIdx].miembros.push({
                            idUsuario: e.idUsuario,
                            carnet:    e.carnet,
                            nombre:    e.nombre
                        });
                        renderMiembrosInline(grupoIdx, listaMiembrosEl);
                        dropdown.classList.remove('abierto');
                        inputBuscar.value = '';
                    };
                }
                dropdown.appendChild(item);
            });

            dropdown.classList.add('abierto');
        }

        // renderiza la lista de miembros de un grupo
        function renderMiembrosInline(grupoIdx, contenedor) {
            contenedor.innerHTML = '';
            const miembros = gruposInline[grupoIdx].miembros;
            if (miembros.length === 0) return;
            miembros.forEach((m, mIdx) => {
                const fila = document.createElement('div');
                fila.className = 'fila-miembro-inline';

                const datos = document.createElement('div');
                datos.className = 'datos-est';
                datos.innerHTML = '<div class="carnet-est">' + (m.carnet || '') + '</div>' +
                                  '<div class="nombre-est">' + (m.nombre || '') + '</div>';

                const btnQ = document.createElement('button');
                btnQ.type      = 'button';
                btnQ.className = 'btn-quitar-miembro-inline';
                btnQ.textContent = 'Quitar';
                btnQ.onclick = () => {
                    gruposInline[grupoIdx].miembros.splice(mIdx, 1);
                    renderMiembrosInline(grupoIdx, contenedor);
                };

                fila.appendChild(datos);
                fila.appendChild(btnQ);
                contenedor.appendChild(fila);
            });
        }

        // crea el bloque visual de un grupo en el contenedor
        function crearBloqueGrupoInline(grupoIdx) {
            const contenedor = document.getElementById('contenedorGruposInline');

            const bloque = document.createElement('div');
            bloque.className = 'bloque-grupo-inline';
            bloque.dataset.idx = grupoIdx;

            // header: input nombre + boton quitar
            const header = document.createElement('div');
            header.className = 'bloque-grupo-inline-header';

            const inputNombre = document.createElement('input');
            inputNombre.type        = 'text';
            inputNombre.placeholder = 'Nombre del grupo ' + (grupoIdx + 1);
            inputNombre.value       = gruposInline[grupoIdx].nombre;
            inputNombre.oninput     = () => { gruposInline[grupoIdx].nombre = inputNombre.value.trim(); };

            const btnQuitar = document.createElement('button');
            btnQuitar.type      = 'button';
            btnQuitar.className = 'btn-quitar-grupo-inline';
            btnQuitar.textContent = 'Quitar grupo';
            btnQuitar.onclick = () => {
                gruposInline.splice(grupoIdx, 1);
                // re-renderizar todos los bloques
                contenedor.innerHTML = '';
                gruposInline.forEach((_, i) => crearBloqueGrupoInline(i));
            };

            header.appendChild(inputNombre);
            header.appendChild(btnQuitar);

            // lista de miembros
            const listaMiembros = document.createElement('div');
            listaMiembros.className = 'lista-miembros-inline';
            renderMiembrosInline(grupoIdx, listaMiembros);

            // buscador
            const wrap = document.createElement('div');
            wrap.className = 'buscador-inline-wrap';

            const inputBuscar = document.createElement('input');
            inputBuscar.type        = 'text';
            inputBuscar.placeholder = 'Buscar estudiante por nombre, carnet o correo...';

            const dropdown = document.createElement('div');
            dropdown.className = 'dropdown-inline';

            wrap.appendChild(inputBuscar);
            wrap.appendChild(dropdown);

            inputBuscar.addEventListener('input', () => {
                renderDropdownInline(dropdown, inputBuscar.value.trim().toLowerCase(),
                    grupoIdx, listaMiembros, inputBuscar);
            });
            inputBuscar.addEventListener('focus', () => {
                renderDropdownInline(dropdown, inputBuscar.value.trim().toLowerCase(),
                    grupoIdx, listaMiembros, inputBuscar);
            });
            document.addEventListener('click', (e) => {
                if (!wrap.contains(e.target)) dropdown.classList.remove('abierto');
            });

            bloque.appendChild(header);
            bloque.appendChild(listaMiembros);
            bloque.appendChild(wrap);
            contenedor.appendChild(bloque);
        }

        // boton agregar grupo
        document.getElementById('btnAgregarGrupoInline').addEventListener('click', () => {
            const idx = gruposInline.length;
            gruposInline.push({ nombre: '', miembros: [] });
            crearBloqueGrupoInline(idx);
        });

        // ── boton Crear ──────────────────────────────────────
        document.getElementById('btnCrear').addEventListener('click', async () => {
            const idCurso      = selectCurso.value;
            const nombre       = document.getElementById('inputNombre').value.trim();
            const descripcion  = document.getElementById('inputDescripcion').value.trim();
            const fechaEntrega = document.getElementById('inputFechaEntrega').value;
            const esGrupal     = checkGrupal.checked ? 1 : 0;
            const mensajeError = document.getElementById('mensajeError');

            mensajeError.style.display = 'none';

            if (!idCurso) {
                mensajeError.textContent   = 'Seleccione un curso.';
                mensajeError.style.display = 'block';
                return;
            }

            if (!nombre || !fechaEntrega) {
                mensajeError.textContent   = 'El nombre y la fecha de entrega son obligatorios.';
                mensajeError.style.display = 'block';
                return;
            }

            // validar que los grupos tengan nombre si se crearon
            if (esGrupal && gruposInline.length > 0) {
                for (let i = 0; i < gruposInline.length; i++) {
                    if (!gruposInline[i].nombre) {
                        mensajeError.textContent   = 'El grupo ' + (i + 1) + ' no tiene nombre.';
                        mensajeError.style.display = 'block';
                        return;
                    }
                }
            }

            const cuerpo = {
                idCurso: parseInt(idCurso, 10),
                nombre,
                descripcion,
                fechaEntrega: fechaEntrega + ' 23:59:00',
                esGrupal
            };

            const url    = esEdicion ? (BASE + '/api/tareas/' + idTarea) : (BASE + '/api/tareas');
            const metodo = esEdicion ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cuerpo)
                });

                const data = await response.json().catch(() => null);

                if (!response.ok) {
                    mensajeError.textContent   = (data && data.error) ? data.error : 'Error al guardar la tarea.';
                    mensajeError.style.display = 'block';
                    return;
                }

                // si hay grupos inline, crearlos con el idTarea devuelto
                const idTareaCreada = data.idTarea || idTarea;

                if (esGrupal && gruposInline.length > 0 && idTareaCreada) {
                    for (const grupo of gruposInline) {
                        try {
                            // 1. crear el grupo
                            const resGrupo = await fetch(
                                BASE + '/api/tareas/' + idTareaCreada + '/grupos',
                                {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ nombre: grupo.nombre })
                                }
                            );
                            const dataGrupo = await resGrupo.json().catch(() => null);
                            const idGrupo   = dataGrupo && dataGrupo.idGrupo ? dataGrupo.idGrupo : null;

                            // 2. agregar miembros uno por uno
                            if (idGrupo && grupo.miembros.length > 0) {
                                for (const m of grupo.miembros) {
                                    await fetch(
                                        BASE + '/api/tareas/' + idTareaCreada + '/grupos',
                                        {
                                            method: 'POST',
                                            headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify({
                                                idGrupo: idGrupo,
                                                accion:  'agregar',
                                                carnet:  m.carnet
                                            })
                                        }
                                    ).catch(() => {});
                                }
                            }
                        } catch (_) {}
                    }
                }

                window.location.href = BASE + '/menuProfesor';

            } catch (error) {
                mensajeError.textContent   = 'Error de conexion. Intente de nuevo.';
                mensajeError.style.display = 'block';
            }
        });

        document.getElementById('btnCerrarSesion').addEventListener('click', () => {
            sessionStorage.removeItem('usuario');
            window.location.href = BASE + '/login';
        });

        cargarCursos();
    </script>
</body>
</html>
