<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background-color: #4B3B8C;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            gap: 12px;
        }

        .tarjeta {
            background-color: #EADDFF;
            border-radius: 16px;
            width: 380px;
            overflow: hidden;
        }

        .tarjeta-header {
            background-color: #6750A4;
            text-align: center;
            padding: 14px 0;
        }

        .tarjeta-header h1 {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .tarjeta-cuerpo {
            padding: 24px 28px 8px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .tarjeta-cuerpo .descripcion {
            font-size: 0.82rem;
            color: #49454F;
        }

        .campo label {
            display: block;
            font-size: 0.85rem;
            color: #1C1B1F;
            margin-bottom: 4px;
        }

        .campo input {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background-color: #fff;
            font-size: 0.9rem;
            color: #1C1B1F;
            outline: none;
        }

        .campo input:focus {
            box-shadow: 0 0 0 2px #6750A4;
        }

        .mensaje-error {
            display: none;
            color: #FF383C;
            font-size: 0.78rem;
            text-align: center;
            padding: 0 28px 10px;
        }

        .tarjeta-pie {
            padding: 4px 28px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .enlace-volver {
            font-size: 0.78rem;
            color: #316AFB;
            text-decoration: none;
        }

        .enlace-volver:hover { text-decoration: underline; }

        .btn-enviar {
            background-color: #34C759;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 10px 28px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-enviar:hover { background-color: #28a745; }

        /* ── Paso 2: ingresar código ── */
        .aviso-codigo {
            font-size: 0.82rem;
            color: #49454F;
            padding: 16px 28px 0;
            text-align: center;
        }

        .btn-reenviar {
            background: transparent;
            color: #316AFB;
            border: none;
            font-size: 0.78rem;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
            display: block;
            margin: 4px auto 0;
        }
    </style>
</head>
<body>

    <!-- Paso 1: ingresar correo -->
    <div class="tarjeta" id="paso1">
        <div class="tarjeta-header">
            <h1>Recuperar contraseña</h1>
        </div>

        <div class="tarjeta-cuerpo">
            <p class="descripcion">Ingrese su correo y le enviaremos un código para restablecer su contraseña.</p>
            <div class="campo">
                <label for="inputCorreo">Correo</label>
                <input type="email" id="inputCorreo" name="correo" autocomplete="email" placeholder="ejemplo@correo.com">
            </div>
        </div>

        <p class="mensaje-error" id="mensajeError1"></p>

        <div class="tarjeta-pie">
            <a href="login" class="enlace-volver">← Volver al inicio</a>
            <button type="button" class="btn-enviar" id="btnEnviar">Enviar código</button>
        </div>
    </div>

    <!-- Paso 2: ingresar código recibido -->
    <div class="tarjeta" id="paso2" style="display:none;">
        <div class="tarjeta-header">
            <h1>Ingrese el código</h1>
        </div>

        <div class="tarjeta-cuerpo">
            <p class="descripcion">Se envió un código a <strong id="correoMostrado"></strong>. Ingréselo a continuación.</p>
            <div class="campo">
                <label for="inputCodigo">Código</label>
                <input type="text" id="inputCodigo" name="codigo" autocomplete="one-time-code" placeholder="Ej: 123456" maxlength="10">
            </div>
        </div>

        <p class="mensaje-error" id="mensajeError2"></p>

        <p class="aviso-codigo">
            ¿No llegó? Revise su carpeta de spam o
            <button type="button" class="btn-reenviar" id="btnReenviar">reenvíe el código</button>
        </p>

        <div class="tarjeta-pie">
            <a href="#" id="btnVolverPaso1" class="enlace-volver">← Cambiar correo</a>
            <button type="button" class="btn-enviar" id="btnVerificar">Verificar</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const BASE = window.API_BASE;
        let tokenGenerado = "";
        let codigoRecibido = "";
        let correoAEnviar = "";

        function validarCorreo(correo) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo);
        }

        // ── Paso 1: enviar código al correo ──
        document.getElementById('btnEnviar').addEventListener('click', async () => {
            const correo       = document.getElementById('inputCorreo').value.trim();
            const mensajeError = document.getElementById('mensajeError1');

            mensajeError.style.display = 'none';

            if (!correo) {
                mensajeError.textContent = 'Por favor, ingrese su correo.';
                mensajeError.style.display = 'block';
                return;
            }

            if (!validarCorreo(correo)) {
                mensajeError.textContent = 'Ingrese un correo válido.';
                mensajeError.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(BASE + '/api/auth/recCont', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo })
                });

                const data = await response.json().catch(() => null);

                if (!response.ok) {
                    const msg = data && data.error ? data.error : 'No se pudo enviar el código.';
                    mensajeError.textContent = msg;
                    mensajeError.style.display = 'block';
                    return;
                }

                tokenGenerado = data.token;
                codigoRecibido = data.codigo;
                correoAEnviar = data.correo;

                document.getElementById('correoMostrado').textContent = correo;
                document.getElementById('paso1').style.display = 'none';
                document.getElementById('paso2').style.display = 'block';
                document.getElementById('inputCodigo').focus();

            } catch (error) {
                mensajeError.textContent = 'Error de conexión. Intente de nuevo.';
                mensajeError.style.display = 'block';
            }
        });

        // ── Paso 2: verificar código ──
        document.getElementById('btnVerificar').addEventListener('click', async () => {
            const correo       = document.getElementById('inputCorreo').value.trim();
            const codigo       = document.getElementById('inputCodigo').value.trim();
            const mensajeError = document.getElementById('mensajeError2');

            mensajeError.style.display = 'none';

            if (!codigo) {
                mensajeError.textContent = 'Por favor, ingrese el código.';
                mensajeError.style.display = 'block';
                return;
            }

            try {
                if (codigo != codigoRecibido) {
                  mensajeError.textContent = 'Código incorrecto';
                  mensajeError.style.display = 'block';
                  return;
                }
                
                window.location.href = BASE + '/nuevaContrasena?token=' + encodeURIComponent(tokenGenerado) + '&correo=' + encodeURIComponent(correoAEnviar);

            } catch (error) {
                mensajeError.textContent = 'Error de conexión. Intente de nuevo.';
                mensajeError.style.display = 'block';
            }
        });

        // ── Reenviar código ──
        document.getElementById('btnReenviar').addEventListener('click', async () => {
            const correo = document.getElementById('inputCorreo').value.trim();
            const btn    = document.getElementById('btnReenviar');

            try {
                await fetch(BASE + '/api/auth/recCont', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo })
                });

                const data = await response.json().catch(() => null);

                if (!response.ok) {
                    const msg = data && data.error ? data.error : 'No se pudo enviar el código.';
                    mensajeError.textContent = msg;
                    mensajeError.style.display = 'block';
                    return;
                }

                btn.textContent = 'Reenviado';
                btn.style.color = '#28a745';
                btn.disabled = true;
                setTimeout(() => {
                    btn.textContent = 'reenvíe el código';
                    btn.style.color = '#316AFB';
                    btn.disabled = false;
                }, 3000);

            } catch (error) {
                mensajeError.textContent = 'Error de conexión. Intente de nuevo.';
                mensajeError.style.display = 'block';
            }
        });

        // ── Volver al paso 1 ──
        document.getElementById('btnVolverPaso1').addEventListener('click', e => {
            e.preventDefault();
            document.getElementById('mensajeError2').style.display = 'none';
            document.getElementById('inputCodigo').value = '';
            document.getElementById('paso2').style.display = 'none';
            document.getElementById('paso1').style.display = 'block';
        });

        // Enter en paso 1
        document.getElementById('inputCorreo').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('btnEnviar').click();
        });

        // Enter en paso 2
        document.getElementById('inputCodigo').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('btnVerificar').click();
        });
    </script>
</body>
</html>
