<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Estudiante</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background-color: #4B3B8C;
            display: flex;
            font-family: sans-serif;
        }

        /* ── sidebar ── */
        .sidebar {
            width: 200px;
            min-height: 100vh;
            background-color: #EADDFF;
            display: flex;
            flex-direction: column;
            padding: 20px 14px;
            gap: 10px;
            flex-shrink: 0;
        }

        .sidebar-perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding-bottom: 14px;
            border-bottom: 1px solid #BFB7CC;
            margin-bottom: 4px;
        }

        .icono-usuario {
            width: 48px; height: 48px;
            background-color: #fff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .icono-usuario svg { width: 28px; height: 28px; fill: #6750A4; }
        .sidebar-perfil span { font-size: 0.85rem; color: #1C1B1F; }

        .nav-btn {
            background-color: #6B5B95; color: #fff;
            border: none; border-radius: 8px;
            padding: 10px 12px; font-size: 0.85rem;
            text-align: left; cursor: pointer; width: 100%;
        }

        .nav-btn:hover { background-color: #4F378A; }
        .nav-btn.activo { background-color: #4F378A; }
        .sidebar-espaciador { flex: 1; }

        .btn-cerrar-sesion {
            background-color: #FF383C; color: #fff;
            border: none; border-radius: 8px;
            padding: 10px 12px; font-size: 0.85rem;
            text-align: left; cursor: pointer; width: 100%;
        }

        .btn-cerrar-sesion:hover { background-color: #cc1f22; }

        /* ── contenido ── */
        .contenido { flex: 1; padding: 32px 28px; }

        .barra-titulo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .barra-titulo h2 {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .btn-nuevo {
            background-color: #34C759; color: #fff;
            border: none; border-radius: 20px;
            padding: 8px 20px; font-size: 0.85rem;
            cursor: pointer; flex-shrink: 0;
        }

        .btn-nuevo:hover { background-color: #28a745; }

        /* ── tarjetas de curso / tarea ── */
        .lista-cursos, .lista-tareas {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tarjeta-curso, .tarjeta-tarea {
            background-color: #C9C9C9;
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .tarjeta-curso span, .tarjeta-tarea-info .nombre {
            font-size: 0.9rem;
            color: #1C1B1F;
            font-weight: 500;
        }

        .tarjeta-tarea-info .meta {
            font-size: 0.75rem;
            color: #575757;
            margin-top: 3px;
        }

        .btn-ver {
            background-color: #316AFB; color: #fff;
            border: none; border-radius: 20px;
            padding: 7px 20px; font-size: 0.82rem;
            cursor: pointer; flex-shrink: 0;
        }

        .btn-ver:hover { background-color: #1a53e0; }

        /* ── panel de tareas ── */
        #panelTareas { display: none; margin-top: 28px; }

        #panelTareas h2 {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 14px;
        }

        /* ── modal unirse a curso ── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background-color: rgba(0,0,0,0.55);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.visible { display: flex; }

        .modal {
            background-color: #EADDFF;
            border-radius: 16px;
            width: 360px;
            overflow: hidden;
        }

        .modal-header {
            background-color: #6750A4;
            padding: 12px 20px;
        }

        .modal-header h3 { color: #fff; font-size: 0.95rem; font-weight: 600; }

        .modal-cuerpo {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-cuerpo label {
            font-size: 0.85rem;
            color: #1C1B1F;
            margin-bottom: 4px;
            display: block;
        }

        .modal-cuerpo select {
            width: 100%;
            padding: 8px 12px;
            border: none; border-radius: 8px;
            background-color: #fff;
            font-size: 0.9rem; color: #1C1B1F;
            outline: none;
        }

        .modal-cuerpo select:focus { box-shadow: 0 0 0 2px #6750A4; }

        .modal-error {
            color: #FF383C;
            font-size: 0.78rem;
            display: none;
        }

        .modal-pie {
            padding: 8px 20px 18px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-cancelar-modal {
            background-color: #FF383C; color: #fff;
            border: none; border-radius: 20px;
            padding: 9px 22px; font-size: 0.88rem; cursor: pointer;
        }

        .btn-cancelar-modal:hover { background-color: #cc1f22; }

        .btn-confirmar-modal {
            background-color: #34C759; color: #fff;
            border: none; border-radius: 20px;
            padding: 9px 22px; font-size: 0.88rem; cursor: pointer;
        }

        .btn-confirmar-modal:hover { background-color: #28a745; }

        /* ── estados ── */
        .cargando { color: #BFB7CC; font-size: 0.88rem; }
        .sin-items { color: #BFB7CC; font-size: 0.88rem; margin-top: 4px; }

        /* badge entrega */
        .badge-entrega {
            font-size: 0.72rem;
            border-radius: 20px;
            padding: 3px 10px;
            font-weight: 600;
            flex-shrink: 0;
            margin-right: 8px;
        }

        .badge-entrega.pendiente { background-color: #BFB7CC; color: #4B3B8C; }
        .badge-entrega.entregado { background-color: #34C759; color: #fff; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-perfil">
            <div class="icono-usuario">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
            </div>
            <span id="nombreUsuario">Usuario</span>
        </div>

        <button class="nav-btn activo" id="btnMisCursos">Mis cursos</button>

        <div class="sidebar-espaciador"></div>
        <button class="btn-cerrar-sesion" id="btnCerrarSesion">Cerrar sesion</button>
    </aside>

    <main class="contenido">
        <!-- sección cursos -->
        <section id="seccionCursos">
            <div class="barra-titulo">
                <h2>Mis cursos</h2>
                <button class="btn-nuevo" id="btnUnirse">+ Unirse a curso</button>
            </div>

            <div class="lista-cursos" id="listaCursos">
                <p class="cargando">Cargando cursos...</p>
            </div>

            <!-- panel de tareas del curso seleccionado -->
            <div id="panelTareas">
                <h2 id="tituloTareas">Tareas</h2>
                <div class="lista-tareas" id="listaTareas">
                    <p class="cargando">Cargando tareas...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- modal para unirse a un curso -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header"><h3>Unirse a un curso</h3></div>
            <div class="modal-cuerpo">
                <div>
                    <label for="selectCursoUnirse">Seleccione el curso</label>
                    <select id="selectCursoUnirse">
                        <option value="">Cargando cursos disponibles...</option>
                    </select>
                </div>
                <p class="modal-error" id="modalError"></p>
            </div>
            <div class="modal-pie">
                <button class="btn-cancelar-modal" id="btnCancelarModal">Cancelar</button>
                <button class="btn-confirmar-modal" id="btnConfirmarUnirse">Unirse</button>
            </div>
        </div>
    </div>

    <script src="../public/js/config.js"></script>
    <script>
        const BASE = window.API_BASE;

        // ── verificar sesion ──────────────────────────────
        const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
        if (!usuario.idUsuario) window.location.href = BASE + '/login';
        if (usuario.nombre) document.getElementById('nombreUsuario').textContent = usuario.nombre;

        // ── cerrar sesion ─────────────────────────────────
        document.getElementById('btnCerrarSesion').addEventListener('click', () => {
            sessionStorage.removeItem('usuario');
            window.location.href = BASE + '/login';
        });

        // ── renderizar cursos del estudiante ──────────────
        function renderCursos(cursos) {
            const lista = document.getElementById('listaCursos');
            lista.innerHTML = '';

            if (!cursos || cursos.length === 0) {
                lista.innerHTML = '<p class="sin-items">No estás matriculado en ningún curso. Usa "+ Unirse a curso".</p>';
                return;
            }

            cursos.forEach(curso => {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-curso';

                const nombre = document.createElement('span');
                // cargarCursosEstudiante devuelve "nombre" del profesor junto al curso
                nombre.textContent = curso.nombreCurso + (curso.nombre ? '  —  Prof. ' + curso.nombre : '');

                const btn = document.createElement('button');
                btn.className = 'btn-ver';
                btn.textContent = 'Ver tareas';
                btn.onclick = () => cargarTareas(curso);

                tarjeta.appendChild(nombre);
                tarjeta.appendChild(btn);
                lista.appendChild(tarjeta);
            });
        }

        // ── cargar cursos desde la API ────────────────────
        async function cargarCursos() {
            const lista = document.getElementById('listaCursos');
            lista.innerHTML = '<p class="cargando">Cargando cursos...</p>';

            try {
                const res = await fetch(BASE + '/api/cursos', {
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!res.ok) {
                    lista.innerHTML = '<p class="sin-items">Error al cargar los cursos.</p>';
                    return;
                }

                const data = await res.json();
                renderCursos(data.cursos || []);

            } catch {
                lista.innerHTML = '<p class="sin-items">Error de conexión.</p>';
            }
        }

        // ── renderizar tareas de un curso ─────────────────
        function renderTareas(tareas) {
            const lista = document.getElementById('listaTareas');
            lista.innerHTML = '';

            if (!tareas || tareas.length === 0) {
                lista.innerHTML = '<p class="sin-items">Este curso no tiene tareas asignadas aún.</p>';
                return;
            }

            tareas.forEach(tarea => {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-tarea';

                const info = document.createElement('div');
                info.className = 'tarjeta-tarea-info';

                const nombre = document.createElement('div');
                nombre.className = 'nombre';
                nombre.textContent = tarea.nombreTarea;

                const meta = document.createElement('div');
                meta.className = 'meta';
                const fecha = tarea.fechaEntrega
                    ? 'Entrega: ' + new Date(tarea.fechaEntrega).toLocaleDateString('es-CR')
                    : 'Sin fecha';
                meta.textContent = fecha + (tarea.esGrupal ? '  |  Grupal' : '  |  Individual');

                info.appendChild(nombre);
                info.appendChild(meta);
                tarjeta.appendChild(info);
                lista.appendChild(tarjeta);
            });
        }

        // ── cargar tareas de un curso ─────────────────────
        async function cargarTareas(curso) {
            const panel = document.getElementById('panelTareas');
            const lista  = document.getElementById('listaTareas');
            panel.style.display = 'block';
            document.getElementById('tituloTareas').textContent = 'Tareas de ' + curso.nombreCurso;
            lista.innerHTML = '<p class="cargando">Cargando tareas...</p>';

            try {
                const res = await fetch(BASE + '/api/tareas?idCurso=' + curso.idCurso, {
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!res.ok) {
                    lista.innerHTML = '<p class="sin-items">Error al cargar las tareas.</p>';
                    return;
                }

                const data = await res.json();
                renderTareas(data.tareas || []);

            } catch {
                lista.innerHTML = '<p class="sin-items">Error de conexión.</p>';
            }
        }

        // ── modal: unirse a un curso ──────────────────────
        const overlay          = document.getElementById('modalOverlay');
        const selectCursoModal = document.getElementById('selectCursoUnirse');
        const modalError       = document.getElementById('modalError');

        document.getElementById('btnUnirse').addEventListener('click', async () => {
            modalError.style.display = 'none';
            selectCursoModal.innerHTML = '<option value="">Cargando...</option>';
            overlay.classList.add('visible');

            try {
                const res = await fetch(BASE + '/api/cursos/todos', {
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json().catch(() => null);

                if (!res.ok || !data || !data.cursos) {
                    selectCursoModal.innerHTML = '<option value="">Error al cargar los cursos</option>';
                    return;
                }

                if (data.cursos.length === 0) {
                    selectCursoModal.innerHTML = '<option value="">No hay cursos disponibles</option>';
                    return;
                }

                selectCursoModal.innerHTML = '<option value="">-- Selecciona un curso --</option>';
                data.cursos.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value       = c.idCurso;
                    opt.textContent = c.nombreCurso;
                    selectCursoModal.appendChild(opt);
                });

            } catch {
                selectCursoModal.innerHTML = '<option value="">Error de conexión</option>';
            }
        });

        document.getElementById('btnCancelarModal').addEventListener('click', () => {
            overlay.classList.remove('visible');
        });

        overlay.addEventListener('click', e => {
            // cerrar al hacer clic fuera del modal
            if (e.target === overlay) overlay.classList.remove('visible');
        });

        document.getElementById('btnConfirmarUnirse').addEventListener('click', async () => {
            const idCurso = selectCursoModal.value;
            modalError.style.display = 'none';

            if (!idCurso) {
                modalError.textContent   = 'Seleccione un curso.';
                modalError.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(BASE + '/api/cursos/unirse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idCurso: parseInt(idCurso, 10) })
                });

                const data = await res.json().catch(() => null);

                if (!res.ok) {
                    modalError.textContent   = (data && data.error) ? data.error : 'Error al unirse al curso.';
                    modalError.style.display = 'block';
                    return;
                }

                overlay.classList.remove('visible');
                cargarCursos(); // refrescar lista

            } catch {
                modalError.textContent   = 'Error de conexión. Intente de nuevo.';
                modalError.style.display = 'block';
            }
        });

        // ── carga inicial ─────────────────────────────────
        cargarCursos();
    </script>
</body>
</html>
