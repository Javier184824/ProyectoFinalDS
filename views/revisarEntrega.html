<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisar entrega</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background-color: #4B3B8C;
            display: flex;
            font-family: sans-serif;
        }

        .sidebar {
            width: 200px;
            min-height: 100vh;
            background-color: #EADDFF;
            display: flex;
            flex-direction: column;
            padding: 20px 14px;
            gap: 10px;
            flex-shrink: 0;
        }

        .sidebar-perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding-bottom: 14px;
            border-bottom: 1px solid #BFB7CC;
            margin-bottom: 4px;
        }

        .icono-usuario {
            width: 48px;
            height: 48px;
            background-color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icono-usuario svg { width: 28px; height: 28px; fill: #6750A4; }
        .sidebar-perfil span { font-size: 0.85rem; color: #1C1B1F; }

        .nav-btn {
            background-color: #6B5B95;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.85rem;
            text-align: left;
            cursor: pointer;
            width: 100%;
        }

        .nav-btn:hover { background-color: #4F378A; }

        .sidebar-espaciador { flex: 1; }

        .btn-cerrar-sesion {
            background-color: #FF383C;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.85rem;
            text-align: left;
            cursor: pointer;
            width: 100%;
        }

        .btn-cerrar-sesion:hover { background-color: #cc1f22; }

        /* layout principal */
        .contenido {
            flex: 1;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        .contenido h2 {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* fila de dos columnas */
        .fila-columnas {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        /* card generica */
        .card {
            background-color: #EADDFF;
            border-radius: 14px;
            overflow: hidden;
        }

        .card-header {
            background-color: #6750A4;
            padding: 10px 16px;
        }

        .card-header h3 {
            color: #fff;
            font-size: 0.88rem;
            font-weight: 600;
        }

        .card-cuerpo {
            padding: 14px 16px;
        }

        /* info del estudiante */
        .card-info { flex: 0 0 260px; }

        .linea-info {
            font-size: 0.83rem;
            color: #1C1B1F;
            padding: 5px 0;
            border-bottom: 1px solid #BFB7CC;
            display: flex;
            gap: 6px;
        }

        .linea-info:last-child { border-bottom: none; }

        .linea-info .etiqueta {
            color: #575757;
            flex-shrink: 0;
            min-width: 80px;
        }

        /* firma */
        .firma-texto {
            font-size: 0.72rem;
            color: #575757;
            word-break: break-all;
            font-family: monospace;
            background-color: #fff;
            border-radius: 6px;
            padding: 8px 10px;
        }

        /* visualizador de codigo */
        .card-codigo { flex: 1; }

        .visor-codigo {
            background-color: #1D192B;
            border-radius: 0 0 10px 10px;
            padding: 14px 16px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #EADDFF;
            white-space: pre;
            overflow-x: auto;
            min-height: 220px;
            max-height: 340px;
            overflow-y: auto;
        }

        .sin-codigo {
            color: #BFB7CC;
            font-style: italic;
            font-size: 0.82rem;
        }

        /* historial */
        .card-historial { width: 100%; }

        .fila-historial {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #BFB7CC;
            font-size: 0.82rem;
            color: #1C1B1F;
        }

        .fila-historial:last-child { border-bottom: none; }

        .badge-version {
            background-color: #6750A4;
            color: #fff;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.72rem;
            flex-shrink: 0;
        }

        .sin-historial {
            color: #6B6B6B;
            font-size: 0.82rem;
            padding: 6px 0;
        }

        /* card calificacion */
        .card-calificar { width: 100%; }

        .fila-calificar {
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .grupo-campo { flex: 1; }

        .grupo-campo label {
            display: block;
            font-size: 0.82rem;
            color: #575757;
            margin-bottom: 4px;
        }

        .grupo-campo input[type="number"],
        .grupo-campo textarea {
            width: 100%;
            padding: 8px 10px;
            border: none;
            border-radius: 8px;
            background-color: #fff;
            font-size: 0.88rem;
            color: #1C1B1F;
            outline: none;
            font-family: inherit;
        }

        .grupo-campo input[type="number"] { max-width: 120px; }

        .grupo-campo textarea {
            resize: vertical;
            min-height: 70px;
        }

        .grupo-campo input:focus,
        .grupo-campo textarea:focus { box-shadow: 0 0 0 2px #6750A4; }

        .card-pie {
            padding: 10px 16px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-atras {
            background-color: #316AFB;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 8px 22px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .btn-atras:hover { background-color: #1a53e0; }

        .btn-guardar {
            background-color: #34C759;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 8px 24px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .btn-guardar:hover { background-color: #28a745; }

        .mensaje-ok {
            display: none;
            color: #34C759;
            font-size: 0.8rem;
        }

        .mensaje-error {
            display: none;
            color: #FF383C;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-perfil">
            <div class="icono-usuario">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
            </div>
            <span id="nombreUsuario">Usuario</span>
        </div>

        <button class="nav-btn" id="btnCursos">Cursos</button>
        <button class="nav-btn" id="btnCrearTarea">Crear tarea</button>

        <div class="sidebar-espaciador"></div>
        <button class="btn-cerrar-sesion" id="btnCerrarSesion">Cerrar sesion</button>
    </aside>

    <main class="contenido">
        <h2 id="tituloPantalla">Revisar entrega</h2>

        <!-- fila superior: info del estudiante + codigo -->
        <div class="fila-columnas">

            <div class="card card-info">
                <div class="card-header"><h3>Informacion</h3></div>
                <div class="card-cuerpo">
                    <div class="linea-info">
                        <span class="etiqueta">Estudiante</span>
                        <span id="infoEstudiante">...</span>
                    </div>
                    <div class="linea-info">
                        <span class="etiqueta">Archivo</span>
                        <span id="infoArchivo">...</span>
                    </div>
                    <div class="linea-info">
                        <span class="etiqueta">Entregado</span>
                        <span id="infoFecha">...</span>
                    </div>
                    <div class="linea-info">
                        <span class="etiqueta">Version</span>
                        <span id="infoVersion">...</span>
                    </div>
                </div>
                <div class="card-header" style="margin-top:2px;"><h3>Firma digital</h3></div>
                <div class="card-cuerpo">
                    <p class="firma-texto" id="firmaTexto">Cargando...</p>
                </div>
            </div>

            <div class="card card-codigo">
                <div class="card-header"><h3>Codigo entregado</h3></div>
                <pre class="visor-codigo" id="visorCodigo"><span class="sin-codigo">Cargando codigo...</span></pre>
            </div>

        </div>

        <!-- calificacion -->
        <div class="card card-calificar">
            <div class="card-header"><h3>Calificacion</h3></div>
            <div class="card-cuerpo">
                <div class="fila-calificar">
                    <div class="grupo-campo">
                        <label for="inputNota">Nota (0 - 100)</label>
                        <input type="number" id="inputNota" min="0" max="100" step="0.5" placeholder="Ej: 85">
                    </div>
                    <div class="grupo-campo" style="flex:2">
                        <label for="inputComentario">Comentario</label>
                        <textarea id="inputComentario" placeholder="Retroalimentacion para el estudiante..."></textarea>
                    </div>
                </div>
            </div>
            <div class="card-pie">
                <button class="btn-atras" id="btnAtras">Atras</button>
                <div style="display:flex;align-items:center;gap:12px;">
                    <span class="mensaje-ok" id="mensajeOk">Calificacion guardada.</span>
                    <span class="mensaje-error" id="mensajeError">Error al guardar.</span>
                    <button class="btn-guardar" id="btnGuardar">Guardar calificacion</button>
                </div>
            </div>
        </div>
    </main>

    <script src="../public/js/config.js"></script>
    <script>
        const BASE = window.API_BASE;

        const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
        if (!usuario.idUsuario) window.location.href = BASE + '/login';
        if (usuario.nombre) document.getElementById('nombreUsuario').textContent = usuario.nombre;

        const params     = new URLSearchParams(window.location.search);
        const idEntrega  = params.get('idEntrega');
        const idTarea    = params.get('idTarea');
        const estudiante = params.get('estudiante') || '';

        document.getElementById('infoEstudiante').textContent = estudiante;

        // navegacion del sidebar
        document.getElementById('btnCursos').addEventListener('click', () => {
            window.location.href = BASE + '/menuProfesor';
        });
        document.getElementById('btnCrearTarea').addEventListener('click', () => {
            window.location.href = BASE + '/crearTarea';
        });

        document.getElementById('btnAtras').onclick = () => {
            const dest = idTarea
                ? BASE + '/entregas?idTarea=' + idTarea
                : BASE + '/menuProfesor';
            window.location.href = dest;
        };

        async function cargarEntrega() {
            if (!idEntrega) {
                document.getElementById('visorCodigo').textContent = 'No se especifico una entrega.';
                return;
            }

            try {
                const response = await fetch(BASE + '/api/entregas/' + idEntrega);
                const data = await response.json().catch(() => null);

                if (!response.ok || !data || !data.entrega) {
                    document.getElementById('visorCodigo').textContent = 'Error al cargar el codigo.';
                    document.getElementById('firmaTexto').textContent  = 'No disponible';
                    return;
                }

                const e = data.entrega;
                if (e.estudiante) document.getElementById('infoEstudiante').textContent = e.estudiante;
                document.getElementById('infoArchivo').textContent = e.archivo || '';
                document.getElementById('infoFecha').textContent   = e.fechaCreacion
                    ? new Date(e.fechaCreacion).toLocaleString('es-CR') : '';
                document.getElementById('infoVersion').textContent = e.version ? 'v' + e.version : '';
                document.getElementById('visorCodigo').textContent = e.contenido || '';
                document.getElementById('firmaTexto').textContent  = e.firma || 'Sin firma';

                if (e.nota !== null && e.nota !== undefined) {
                    document.getElementById('inputNota').value = e.nota;
                }
                if (e.comentarioProfesor) {
                    document.getElementById('inputComentario').value = e.comentarioProfesor;
                }

            } catch (error) {
                document.getElementById('visorCodigo').textContent = 'Error de conexion.';
            }
        }

        document.getElementById('btnGuardar').addEventListener('click', async () => {
            const nota       = document.getElementById('inputNota').value;
            const comentario = document.getElementById('inputComentario').value.trim();
            const mensajeOk  = document.getElementById('mensajeOk');
            const mensajeErr = document.getElementById('mensajeError');

            mensajeOk.style.display  = 'none';
            mensajeErr.style.display = 'none';

            if (nota === '' || isNaN(nota) || nota < 0 || nota > 100) {
                mensajeErr.textContent   = 'Ingrese una nota valida entre 0 y 100.';
                mensajeErr.style.display = 'inline';
                return;
            }

            try {
                const response = await fetch(BASE + '/api/entregas/' + idEntrega, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nota: parseFloat(nota), comentarioProfesor: comentario })
                });

                if (response.ok) {
                    mensajeOk.style.display = 'inline';
                } else {
                    mensajeErr.textContent   = 'Error al guardar la calificacion.';
                    mensajeErr.style.display = 'inline';
                }

            } catch (error) {
                mensajeErr.textContent   = 'Error de conexion.';
                mensajeErr.style.display = 'inline';
            }
        });

        document.getElementById('btnCerrarSesion').addEventListener('click', () => {
            sessionStorage.removeItem('usuario');
            window.location.href = BASE + '/login';
        });

        cargarEntrega();
    </script>
</body>
</html>
